version: '3.9'

services:

  mongodb:
    build:
      context: ./db
    container_name: quickbite-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: quickbite
      MONGO_APP_PASSWORD: quickbite_password
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - quickbite-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: production
    container_name: quickbite-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: development
      MONGODB_URI: mongodb://quickbite_user:quickbite_password@mongodb:27017/quickbite
      JWT_SECRET: dev_jwt_secret_change_in_prod
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - quickbite-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: production
    container_name: quickbite-frontend
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - quickbite-network
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  quickbite-network:
    driver: bridge
